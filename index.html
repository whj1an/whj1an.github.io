<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jace — University of Ottawa, Computer Science and Mathematics">
    <title>Jace</title>
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --text: #e8ecf1;
            --muted: #8b9cb3;
            --accent: #6eb5ff;
            --accent-dim: rgba(110, 181, 255, 0.15);
            --radius: 12px;
            --font: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            max-width: 640px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        header {
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tag {
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: clamp(1.75rem, 5vw, 2.25rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 0.5rem;
        }

        .lead {
            color: var(--muted);
            font-size: 1.05rem;
            margin: 0;
        }

        section {
            margin-bottom: 2.25rem;
        }

        section h2 {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 0 0 1rem;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.25rem 1.35rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        ul {
            margin: 0;
            padding-left: 1.15rem;
        }

        li {
            margin-bottom: 0.4rem;
        }

        li:last-child {
            margin-bottom: 0;
        }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.85rem;
            color: var(--muted);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 1rem;
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            color: var(--accent);
            background: var(--accent-dim);
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <span class="tag">Personal site</span>
            <h1>Hello, I'm Jace</h1>
            <p class="lead">University of Ottawa — Computer Science and Mathematics</p>
            <span class="pill" aria-hidden="true">Student · Builder</span>
        </header>

        <main>
            <section id="projects" aria-labelledby="projects-heading">
                <h2 id="projects-heading">Projects</h2>
                <div class="card">
                    <ul>
                        <li>Algorithm Practice</li>
                        <li>Database Project</li>
                    </ul>
                </div>
            </section>
        </main>

        <footer>
            <p>This page is a simple start — you can add links, a résumé, and more projects anytime.</p>
        </footer>
    </div>
</body>
</html>
